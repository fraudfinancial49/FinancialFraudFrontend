server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — client-side routing (react-router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse proxy every Phase 4 route family to the deployed FastAPI
    # backend on Render. proxy_ssl_server_name is required so nginx sends
    # the correct SNI/Host for TLS to a name-based HTTPS upstream.
    location /api/ {
        proxy_pass https://financialfraudbackend.onrender.com;
        proxy_ssl_server_name on;
        proxy_set_header Host financialfraudbackend.onrender.com;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /auth/ {
        proxy_pass https://financialfraudbackend.onrender.com;
        proxy_ssl_server_name on;
        proxy_set_header Host financialfraudbackend.onrender.com;
    }
    location /vault/ {
        proxy_pass https://financialfraudbackend.onrender.com;
        proxy_ssl_server_name on;
        proxy_set_header Host financialfraudbackend.onrender.com;
    }
    location /honeypot/ {
        proxy_pass https://financialfraudbackend.onrender.com;
        proxy_ssl_server_name on;
        proxy_set_header Host financialfraudbackend.onrender.com;
    }
    location /admin/ {
        proxy_pass https://financialfraudbackend.onrender.com;
        proxy_ssl_server_name on;
        proxy_set_header Host financialfraudbackend.onrender.com;
    }
    location /health {
        proxy_pass https://financialfraudbackend.onrender.com;
        proxy_ssl_server_name on;
        proxy_set_header Host financialfraudbackend.onrender.com;
    }
    location /ready {
        proxy_pass https://financialfraudbackend.onrender.com;
        proxy_ssl_server_name on;
        proxy_set_header Host financialfraudbackend.onrender.com;
    }
    location /model-info {
        proxy_pass https://financialfraudbackend.onrender.com;
        proxy_ssl_server_name on;
        proxy_set_header Host financialfraudbackend.onrender.com;
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
}
